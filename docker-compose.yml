version: "3.9"
services:
  app:
    build: .
    restart: always
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - ./server/prisma/dev.db:/app/server/prisma/dev.db
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
volumes:
  caddy_data:
  caddy_config:
