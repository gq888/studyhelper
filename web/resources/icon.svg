  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- 学士帽 -->
  <g transform="translate(220,150)">
    <rect x="0" y="80" width="600" height="36" rx="10" fill="#1f1d1c"/>
