  <!-- 腮红 -->
  <circle cx="306" cy="700" r="36" fill="#fdba74" opacity="0.55"/>
  <circle cx="718" cy="700" r="36" fill="#fdba74" opacity="0.55"/>
  <!-- 书本 -->
  <g transform="translate(322,800)">
    <rect x="0" y="0" width="380" height="120" rx="14" fill="#fff" stroke="#1f1d1c" stroke-width="10"/>
    <line x1="190" y1="10" x2="190" y2="110" stroke="#1f1d1c" stroke-width="8"/>
