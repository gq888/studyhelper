  <ellipse cx="240" cy="380" rx="86" ry="92" fill="#1f1d1c"/>
  <ellipse cx="784" cy="380" rx="86" ry="92" fill="#1f1d1c"/>
  <!-- 眼周 -->
  <ellipse cx="376" cy="556" rx="84" ry="108" fill="#1f1d1c" transform="rotate(-8 376 556)"/>
  <ellipse cx="648" cy="556" rx="84" ry="108" fill="#1f1d1c" transform="rotate(8 648 556)"/>
