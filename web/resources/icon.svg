    <line x1="570" y1="80" x2="640" y2="280" stroke="#1f1d1c" stroke-width="18"/>
    <circle cx="640" cy="288" r="32" fill="#fde047"/>
  </g>
  <!-- 头 -->
  <ellipse cx="512" cy="600" rx="320" ry="290" fill="#fff" stroke="#1f1d1c" stroke-width="14"/>
